<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบฝึกทำข้อสอบอาจารย์บุญเรือง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0fdfa; } 
        .hidden { display: none !important; }
        .radio-custom:checked + div { border-color: #0d9488; background-color: #f0fdfa; }
        .disabled-label { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <div class="bg-teal-600 text-white p-6 text-center shadow-md relative">
            <h1 class="text-2xl md:text-3xl font-bold tracking-wide">🎓 ระบบฝึกทำข้อสอบอาจารย์บุญเรือง</h1>
            <p class="mt-2 text-teal-100 text-sm md:text-base" id="header-subtitle">จัดทำโดยโยโยโย และ Google Gemini</p>
        </div>

        <div id="setup-screen" class="p-6 md:p-10">
            <h2 class="text-xl font-bold mb-4 text-teal-800">1. เลือกหมวดวิชาที่ต้องการฝึก (เลือกได้หลายหมวด)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8">
                <label class="flex items-center p-3 border-2 rounded-xl cursor-pointer hover:bg-teal-50 transition">
                    <input type="checkbox" value="Transmission Line Parameters" class="category-cb w-5 h-5 text-teal-600 rounded focus:ring-teal-500" checked>
                    <span class="ml-3 font-medium">Transmission Line Parameters</span>
                </label>
                <label class="flex items-center p-3 border-2 rounded-xl cursor-pointer hover:bg-teal-50 transition">
                    <input type="checkbox" value="Power Transmission System" class="category-cb w-5 h-5 text-teal-600 rounded focus:ring-teal-500" checked>
                    <span class="ml-3 font-medium">ระบบส่งกำลังไฟฟ้า (Power Transmission)</span>
                </label>
                <label class="flex items-center p-3 border-2 rounded-xl cursor-pointer hover:bg-teal-50 transition">
                    <input type="checkbox" value="Electrical Substation" class="category-cb w-5 h-5 text-teal-600 rounded focus:ring-teal-500" checked>
                    <span class="ml-3 font-medium">สถานีไฟฟ้าย่อย (Substation)</span>
                </label>
                <label class="flex items-center p-3 border-2 rounded-xl cursor-pointer hover:bg-teal-50 transition">
                    <input type="checkbox" value="PDP2018" class="category-cb w-5 h-5 text-teal-600 rounded focus:ring-teal-500" checked>
                    <span class="ml-3 font-medium">แผนพลังงาน PDP2018</span>
                </label>
            </div>

            <h2 class="text-xl font-bold mb-4 text-teal-800">2. เลือกโหมดการทำข้อสอบ</h2>
            <div class="space-y-3 mb-8">
                <label class="flex items-center p-4 border-2 rounded-xl cursor-pointer hover:bg-teal-50 transition">
                    <input type="radio" name="quizMode" value="instant" class="w-5 h-5 text-teal-600 focus:ring-teal-500" checked>
                    <div class="ml-3">
                        <p class="font-bold text-gray-800">⚡ เฉลยทันที (Instant Feedback)</p>
                        <p class="text-sm text-gray-500">เรียงตามลำดับเดิม เลือกคำตอบปุ๊บ ระบบจะเฉลยให้ทันที เหมาะสำหรับฝึกจำ</p>
                    </div>
                </label>
                <label class="flex items-center p-4 border-2 rounded-xl cursor-pointer hover:bg-teal-50 transition">
                    <input type="radio" name="quizMode" value="end" class="w-5 h-5 text-teal-600 focus:ring-teal-500">
                    <div class="ml-3">
                        <p class="font-bold text-gray-800">📝 เฉลยท้ายสุด (Mock Exam)</p>
                        <p class="text-sm text-gray-500">เรียงตามลำดับเดิม ทำรวดเดียวให้เสร็จ แล้วค่อยดูคะแนนตอนกดส่ง</p>
                    </div>
                </label>
                <label class="flex items-center p-4 border-2 rounded-xl cursor-pointer hover:bg-teal-50 transition">
                    <input type="radio" name="quizMode" value="random50" class="w-5 h-5 text-teal-600 focus:ring-teal-500">
                    <div class="ml-3">
                        <p class="font-bold text-gray-800">🔥 สุ่ม 50 ข้อจากทุกชุด (Ultimate Challenge)</p>
                        <p class="text-sm text-gray-500">ระบบจะสุ่มดึงข้อสอบจากทุกหมวดมารวมกัน 50 ข้อ แล้วเฉลยตอนท้าย</p>
                    </div>
                </label>
            </div>

            <div class="mt-8 text-center">
                <button onclick="startQuiz()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 px-12 rounded-full shadow-lg transition transform hover:scale-105 text-xl">
                    🚀 เริ่มทำข้อสอบกันเลย!
                </button>
            </div>
        </div>

        <div id="quiz-screen" class="hidden p-6 md:p-8 min-h-[400px] flex flex-col">
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-bold text-teal-600 uppercase tracking-wider" id="current-category">Category</span>
                    <span class="text-sm font-bold bg-teal-100 text-teal-800 py-1 px-4 rounded-full" id="progress-text">ข้อ 1 / 20</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div class="bg-teal-500 h-2.5 rounded-full transition-all duration-300" id="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="flex-grow">
                <h3 class="text-xl md:text-2xl font-bold text-gray-800 mb-6 leading-relaxed" id="question-text">คำถามจะแสดงที่นี่?</h3>
                <div class="space-y-3" id="options-container">
                    </div>
                <div id="explanation-box" class="hidden mt-6 p-5 rounded-xl text-md font-medium border shadow-inner"></div>
            </div>

            <div class="mt-10 pt-6 border-t flex justify-between items-center">
                <button id="prev-btn" onclick="prevQuestion()" class="px-6 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    ◀ ย้อนกลับ
                </button>
                <button id="next-btn" onclick="nextQuestion()" class="px-8 py-3 rounded-xl font-bold text-white bg-teal-500 hover:bg-teal-600 transition shadow-md">
                    ถัดไป ▶
                </button>
                <button id="submit-btn" onclick="submitQuiz()" class="hidden px-8 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 transition shadow-md transform hover:scale-105">
                    📥 ส่งคำตอบ
                </button>
            </div>
        </div>

        <div id="result-screen" class="hidden p-6 md:p-10 text-center">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-gray-800 mb-2" id="result-greeting">ผลสอบของพี่มาแล้วค่ะ!</h2>
                <div class="w-36 h-36 mx-auto rounded-full flex items-center justify-center border-4 border-teal-500 mb-4 bg-teal-50 shadow-inner">
                    <span id="score-display" class="text-5xl font-extrabold text-teal-600">0</span>
                </div>
                <p id="feedback-msg" class="text-xl font-medium text-gray-600 mb-2"></p>
                <p id="score-fraction" class="text-gray-500 text-sm mb-6"></p>
                
                <div class="flex justify-center gap-3 mt-6 text-sm md:text-base">
                    <div class="bg-green-100 text-green-800 px-5 py-3 rounded-xl shadow-sm border border-green-200 flex-1">✅ ถูก<br><span id="stat-correct" class="text-2xl font-bold">0</span></div>
                    <div class="bg-red-100 text-red-800 px-5 py-3 rounded-xl shadow-sm border border-red-200 flex-1">❌ ผิด<br><span id="stat-wrong" class="text-2xl font-bold">0</span></div>
                    <div class="bg-gray-100 text-gray-800 px-5 py-3 rounded-xl shadow-sm border border-gray-200 flex-1">⚪ ข้าม<br><span id="stat-skipped" class="text-2xl font-bold">0</span></div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-center gap-4 mt-8">
                <button onclick="showReviewScreen()" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-4 px-8 rounded-full transition shadow-md">
                    🔍 ทบทวนเฉลยทั้งหมด
                </button>
                <button id="retry-wrong-btn" onclick="retryWrongQuestions()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-8 rounded-full transition shadow-md hidden">
                    🎯 ทำเฉพาะข้อที่ผิดซ้ำ
                </button>
                <button onclick="location.reload()" class="bg-teal-100 hover:bg-teal-200 text-teal-800 font-bold py-4 px-8 rounded-full transition">
                    🏠 กลับหน้าแรก
                </button>
            </div>
        </div>

        <div id="review-screen" class="hidden p-6 md:p-8 bg-gray-50">
            <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-300">
                <h2 class="text-2xl font-bold text-gray-800">🔍 ทบทวนเฉลย</h2>
                <button onclick="backToResult()" class="text-teal-600 hover:text-teal-800 font-bold px-4 py-2 border border-teal-600 rounded-lg">กลับหน้าคะแนน</button>
            </div>
            <div id="review-container" class="space-y-6"></div>
            <div class="mt-8 text-center">
                <button onclick="backToResult()" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-10 rounded-full shadow-lg transition">
                    กลับหน้าคะแนน
                </button>
            </div>
        </div>

    </div>

    <script>
        // -------------------------------------------------------------------------
        // 📌 พี่สามารถเอา Array ข้อสอบทั้ง 628 ข้อที่น้องทำให้ มาวางต่อกันในนี้ได้เลยค่ะ!
        // -------------------------------------------------------------------------
        const allQuestionsDb = [
            // --- Transmission Line ---
            { category: "Transmission Line Parameters", q: "หน่วยของค่า Inductance ต่อหน่วยความยาวของสายส่งคืออะไร?", options: ["Henry (H)", "Henry per meter (H/m)", "Farad per meter (F/m)", "Ohm per meter (Ω/m)"], answerText: "Henry per meter (H/m)" },
            { category: "Transmission Line Parameters", q: "ปัจจัยใดที่มีผลต่อค่า Capacitance ของสายส่งมากที่สุด?", options: ["ความยาวสายส่ง", "ระยะห่างระหว่างตัวนำ", "ความเร็วของคลื่นแม่เหล็กไฟฟ้า", "กระแสที่ไหลผ่านสายส่ง"], answerText: "ระยะห่างระหว่างตัวนำ" },
            { category: "Transmission Line Parameters", q: "การสูญเสียพลังงานในสายส่งที่เกิดจากกระแสวนในตัวนำเรียกว่าอะไร?", options: ["Ohmic Loss", "Dielectric Loss", "Eddy Current Loss", "Corona Loss"], answerText: "Eddy Current Loss" },
            { category: "Transmission Line Parameters", q: "ค่าความต้านทานของสายส่งขึ้นอยู่กับปัจจัยใดบ้าง?", options: ["ความยาวและพื้นที่หน้าตัดของตัวนำ", "อุณหภูมิและค่าความจุไฟฟ้า", "การกระจายตัวของสนามไฟฟ้า", "ความถี่และเฟสของแรงดันไฟฟ้า"], answerText: "ความยาวและพื้นที่หน้าตัดของตัวนำ" },
            { category: "Transmission Line Parameters", q: "หน่วยของค่าความต้านทานต่อหน่วยความยาวของสายส่งคืออะไร?", options: ["Ohm per meter (Ω/m)", "Ohm (Ω)", "Siemens per meter (S/m)", "Farad per meter (F/m)"], answerText: "Ohm per meter (Ω/m)" },
            { category: "Transmission Line Parameters", q: "Transmission Line ถูกจัดประเภทออกเป็นกี่ประเภทหลัก?", options: ["2 ประเภท", "3 ประเภท", "4 ประเภท", "5 ประเภท"], answerText: "4 ประเภท" },
            { category: "Transmission Line Parameters", q: "ในสายส่งระยะสั้น (Short Transmission Line) ค่าความจุไฟฟ้าของสายส่งถือว่าเป็นอย่างไร?", options: ["ไม่สามารถละเลยได้", "มีผลต่อแรงดันตกของสายส่ง", "ละเลยได้", "มีค่าคงที่"], answerText: "ละเลยได้" },
            { category: "Transmission Line Parameters", q: "ใน Medium Transmission Line ค่าความจุไฟฟ้าถูกพิจารณาอย่างไร?", options: ["ค่าความจุไฟฟ้าไม่สำคัญ", "คำนวณโดยใช้ Pi หรือ T Model", "ใช้การประมาณแบบอนุกรม", "ไม่มีผลกระทบต่อแรงดันไฟฟ้า"], answerText: "คำนวณโดยใช้ Pi หรือ T Model" },
            { category: "Transmission Line Parameters", q: "Transmission Line ประเภทใดที่ต้องใช้ Distributed Parameter Analysis?", options: ["Short Transmission Line", "Medium Transmission Line", "Long Transmission Line", "ทั้งหมด"], answerText: "Long Transmission Line" },
            { category: "Transmission Line Parameters", q: "สายส่งที่มีความยาวเกิน 250 km มักถูกจัดอยู่ในประเภทใด?", options: ["Short Transmission Line", "Medium Transmission Line", "Long Transmission Line", "Extra Long Transmission Line"], answerText: "Long Transmission Line" },
            { category: "Transmission Line Parameters", q: "ค่า Characteristic Impedance (Zo) ของสายส่งขึ้นอยู่กับอะไรบ้าง?", options: ["ความต้านทานและรีแอกแตนซ์ของสายส่ง", "ค่า Inductance และ Capacitance ต่อหน่วยความยาว", "ความถี่ของระบบไฟฟ้า", "กระแสที่ไหลผ่านสายส่ง"], answerText: "ค่า Inductance และ Capacitance ต่อหน่วยความยาว" },
            { category: "Transmission Line Parameters", q: "Propagation Constant (γ) ของสายส่งมีหน่วยเป็นอะไร?", options: ["ไม่มีหน่วย", "Ohm (Ω)", "Neper per meter (Np/m)", "Farad per meter (F/m)"], answerText: "Neper per meter (Np/m)" },
            { category: "Transmission Line Parameters", q: "ค่า Propagation Constant (γ) คำนวณจากสมการใด?", options: ["γ = (R+jωL)(G+jωC)", "γ = R+jωL", "γ = G+jωC", "γ = V/I"], answerText: "γ = (R+jωL)(G+jωC)" },
            { category: "Transmission Line Parameters", q: "ค่า Surge Impedance ของสายส่งมักมีค่าอยู่ในช่วงใด?", options: ["1-10 Ω", "10-50 Ω", "50-500 Ω", "500-1000 Ω"], answerText: "50-500 Ω" },
            { category: "Transmission Line Parameters", q: "สมการ Surge Impedance (Zc) มีรูปแบบใด?", options: ["Zc = √(L/C)", "Zc = L/C", "Zc = R+jX", "Zc = G+jB"], answerText: "Zc = √(L/C)" },
            { category: "Transmission Line Parameters", q: "ในการวิเคราะห์สายส่งแบบ Long Transmission Line ค่าความต้านทานและรีแอกแตนซ์มีผลกระทบอย่างไร?", options: ["ไม่มีผลกระทบ", "ส่งผลต่อค่าความต้านทานลักษณะเฉพาะ", "ส่งผลเฉพาะค่า Capacitance", "มีผลเฉพาะในสายส่งระยะสั้น"], answerText: "ส่งผลต่อค่าความต้านทานลักษณะเฉพาะ" },
            { category: "Transmission Line Parameters", q: "Voltage Regulation คืออะไร?", options: ["ความสามารถในการรักษาระดับแรงดันที่โหลด", "ความสามารถของสายส่งในการลดกระแสไฟฟ้า", "การลดลงของค่าความต้านทานของสายส่ง", "การเพิ่มขึ้นของกระแสไฟฟ้าในสายส่ง"], answerText: "ความสามารถในการรักษาระดับแรงดันที่โหลด" },
            { category: "Transmission Line Parameters", q: "Voltage Regulation ของสายส่งคำนวณจากสมการใด?", options: ["VR = ((V_no-load - V_full-load) / V_full-load) * 100%", "VR = ((V_no-load - V_full-load) / V_no-load) * 100%", "VR = Z × I", "VR = P + jQ"], answerText: "VR = ((V_no-load - V_full-load) / V_full-load) * 100%" },
            { category: "Transmission Line Parameters", q: "การลดค่า Voltage Regulation ทำให้เกิดผลอย่างไร?", options: ["แรงดันไฟฟ้าตกในสายส่งลดลง", "เพิ่มค่าการสูญเสียพลังงานในสายส่ง", "ลดค่า Impedance ของสายส่ง", "ไม่มีผลต่อประสิทธิภาพของระบบไฟฟ้า"], answerText: "แรงดันไฟฟ้าตกในสายส่งลดลง" },
            { category: "Transmission Line Parameters", q: "Ferranti Effect มักเกิดขึ้นในสายส่งประเภทใด?", options: ["Short Transmission Line", "Medium Transmission Line", "Long Transmission Line", "ไม่มีผลต่อ Transmission Line"], answerText: "Long Transmission Line" },
            { category: "Transmission Line Parameters", q: "ค่า Efficiency ของสายส่งถูกกำหนดโดยอะไร?", options: ["อัตราส่วนของกำลังไฟฟ้าที่รับมาที่โหลดต่อกำลังไฟฟ้าที่ป้อนเข้า", "อัตราการสูญเสียพลังงานไฟฟ้า", "การเพิ่มขึ้นของค่า Impedance", "ความสามารถในการรักษาระดับแรงดัน"], answerText: "อัตราส่วนของกำลังไฟฟ้าที่รับมาที่โหลดต่อกำลังไฟฟ้าที่ป้อนเข้า" },
            { category: "Transmission Line Parameters", q: "ค่า ABCD Parameter ใช้สำหรับอะไร?", options: ["วิเคราะห์พฤติกรรมของสายส่ง", "คำนวณค่าความต้านทาน", "หาค่าความจุไฟฟ้า", "คำนวณค่ากระแสของสายส่ง"], answerText: "วิเคราะห์พฤติกรรมของสายส่ง" },
            { category: "Transmission Line Parameters", q: "ใน ABCD Parameters ค่า D มีค่าประมาณเท่าไรในสายส่งที่ไม่มี Loss?", options: ["0", "1", "∞", "-1"], answerText: "1" },
            { category: "Transmission Line Parameters", q: "การชดเชยค่าแรงดันไฟฟ้าในสายส่งทำได้โดยใช้วิธีใด?", options: ["การใช้ตัวเก็บประจุแบบอนุกรม", "การใช้ตัวเก็บประจุแบบขนาน", "การใช้ Reactors", "ถูกทุกข้อ"], answerText: "ถูกทุกข้อ" },
            { category: "Transmission Line Parameters", q: "ในการวิเคราะห์ Fault ในสายส่ง ปริมาณใดที่ต้องพิจารณาเป็นหลัก?", options: ["ค่าแรงดันและกระแสที่จุดเกิด Fault", "ค่าความถี่ของระบบไฟฟ้า", "ค่าพลังงานที่สูญเสียไป", "ค่า Capacitance เท่านั้น"], answerText: "ค่าแรงดันและกระแสที่จุดเกิด Fault" },
            { category: "Transmission Line Parameters", q: "ค่าความนำไฟฟ้า (Conductance, G) ของสายส่งเกิดจากปัจจัยใดเป็นหลัก?", options: ["ความต้านทานของตัวนำไฟฟ้า", "การรั่วไหลของกระแสผ่านฉนวนระหว่างตัวนำ", "ค่า Inductance ของสายส่ง", "ระยะห่างระหว่างตัวนำ"], answerText: "การรั่วไหลของกระแสผ่านฉนวนระหว่างตัวนำ" },

            { category: "PDP2018", q: "กฟภ. มีการดำเนินงานตามหลักธรรมาภิบาลอย่างไร?", options: ["มีความโปร่งใสในการดำเนินงาน", "มีการตรวจสอบและประเมินผลการปฏิบัติงาน", "มีการเปิดเผยข้อมูลต่อสาธารณะ", "ถูกทุกข้อ"], answerText: "ถูกทุกข้อ" } //


        ];

        // ตัวแปรสถานะของแอปพลิเคชัน
        let currentSessionQuestions = [];
        let userAnswers = {};
        let currentMode = "";
        let currentQuestionIndex = 0;
        let wrongQuestionsForRetry = [];

        // ฟังก์ชันสุ่ม Array
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 1. เริ่มทำข้อสอบ
        function startQuiz(isRetry = false) {
            userAnswers = {};
            currentQuestionIndex = 0;
            currentMode = document.querySelector('input[name="quizMode"]:checked').value;
            
            if(!isRetry) {
                if(currentMode === 'random50') {
                    // โหมดสุ่ม 50 ข้อ สุ่มลำดับข้อสอบ
                    currentSessionQuestions = shuffleArray(allQuestionsDb).slice(0, 50);
                } else {
                    // โหมดอื่นๆ ไม่สุ่มลำดับ ดึงมาทั้งหมดตามหมวดที่เลือก
                    const selectedCategories = Array.from(document.querySelectorAll('.category-cb:checked')).map(cb => cb.value);
                    if(selectedCategories.length === 0) {
                        alert("พี่อย่าลืมติ๊กเลือกหมวดวิชาอย่างน้อย 1 หมวดนะคะ!");
                        return;
                    }
                    currentSessionQuestions = allQuestionsDb.filter(q => selectedCategories.includes(q.category));
                }
            }

            if(currentSessionQuestions.length === 0) {
                alert("ขออภัยค่ะ ไม่มีข้อสอบในหมวดที่เลือกเลย 😭");
                return;
            }

            // เตรียมตัวเลือกโดย *ไม่สลับลำดับตัวเลือก*
            currentSessionQuestions = currentSessionQuestions.map(q => {
                let displayOptions = [...q.options]; // ใช้ลำดับเดิม
                let correctIndex = displayOptions.indexOf(q.answerText);
                return { ...q, displayOptions, correctIndex };
            });

            // สลับหน้าจอ
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('review-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            document.getElementById('header-subtitle').innerText = isRetry ? "🎯 โหมดซ่อมข้อที่ผิด (สู้ๆ นะคะพี่!)" : "📝 กำลังทำข้อสอบ ขอให้ได้คะแนนเยอะๆ น้า";

            renderCurrentQuestion();
        }

        // 2. แสดงผลข้อสอบทีละข้อ
        function renderCurrentQuestion() {
            const q = currentSessionQuestions[currentQuestionIndex];
            
            // อัปเดต Progress
            const total = currentSessionQuestions.length;
            document.getElementById('progress-text').innerText = `ข้อ ${currentQuestionIndex + 1} / ${total}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / total) * 100}%`;
            document.getElementById('current-category').innerText = q.category;
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${q.q}`;

            // สร้างตัวเลือก
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            const hasAnswered = userAnswers[currentQuestionIndex] !== undefined;
            const selectedVal = userAnswers[currentQuestionIndex];

            // สร้าง Prefix ก. ข. ค. ง. สำหรับแสดงผล
            const prefixArr = ['ก.', 'ข.', 'ค.', 'ง.', 'จ.', 'ฉ.'];

            q.displayOptions.forEach((opt, oIndex) => {
                const isSelected = selectedVal === oIndex;
                const prefix = prefixArr[oIndex] || '';
                
                // สำหรับโหมด Instant ถ้าตอบไปแล้วให้ล็อค input ทันที
                let labelClasses = "block relative cursor-pointer group";
                if (hasAnswered && currentMode === 'instant') labelClasses += " disabled-label";

                // จัดการสีของกล่องตัวเลือก (สำหรับโหมด Instant ที่ตอบแล้ว)
                let boxClasses = "p-4 border-2 rounded-xl transition duration-200 group-hover:bg-teal-50 peer-checked:border-teal-500 peer-checked:bg-teal-50 peer-checked:shadow-sm";
                if (hasAnswered && currentMode === 'instant') {
                    if (oIndex === q.correctIndex) {
                        boxClasses = "p-4 border-2 rounded-xl transition duration-200 border-green-500 bg-green-50 border-2 font-bold text-green-800 shadow-sm"; // สีเขียวข้อที่ถูก
                    } else if (isSelected && oIndex !== q.correctIndex) {
                        boxClasses = "p-4 border-2 rounded-xl transition duration-200 border-red-500 bg-red-50 text-red-800 shadow-sm"; // สีแดงข้อที่ผิด
                    } else {
                        boxClasses = "p-4 border-2 rounded-xl transition duration-200 bg-gray-50 opacity-60"; // ข้อที่ไม่ได้เลือก
                    }
                }

                optionsContainer.innerHTML += `
                    <label class="${labelClasses}" id="label-${currentQuestionIndex}-${oIndex}">
                        <input type="radio" name="q-option" value="${oIndex}" class="peer sr-only radio-custom" 
                            onchange="handleSelect(${oIndex})" ${isSelected ? 'checked' : ''} ${hasAnswered && currentMode === 'instant' ? 'disabled' : ''}>
                        <div class="${boxClasses} flex">
                            <span class="font-bold mr-3">${prefix}</span>
                            <span class="text-lg">${opt}</span>
                        </div>
                    </label>
                `;
            });

            // จัดการปุ่ม
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const submitBtn = document.getElementById('submit-btn');

            prevBtn.disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === total - 1) {
                nextBtn.classList.add('hidden');
                submitBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                submitBtn.classList.add('hidden');
            }

            // จัดการกล่องเฉลย (Instant Mode)
            const explanationBox = document.getElementById('explanation-box');
            if (hasAnswered && currentMode === 'instant') {
                explanationBox.classList.remove('hidden');
                if (selectedVal === q.correctIndex) {
                    explanationBox.innerHTML = "✅ ถูกต้องค่ะ! เยี่ยมมาก";
                    explanationBox.className = "mt-6 p-5 rounded-xl text-md font-medium border bg-green-50 border-green-200 text-green-700 block shadow-inner";
                } else {
                    const correctPrefix = prefixArr[q.correctIndex] || '';
                    explanationBox.innerHTML = `❌ ผิดค่ะ ข้อที่ถูกคือ: <span class="font-bold underline">${correctPrefix} ${q.answerText}</span>`;
                    explanationBox.className = "mt-6 p-5 rounded-xl text-md font-medium border bg-red-50 border-red-200 text-red-700 block shadow-inner";
                }
            } else {
                explanationBox.classList.add('hidden');
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 3. บันทึกคำตอบ
        function handleSelect(selectedValue) {
            userAnswers[currentQuestionIndex] = selectedValue;
            
            if (currentMode === 'instant') {
                renderCurrentQuestion(); // รีเฟรชเพื่อโชว์เฉลยและล็อคข้อ
            }
        }

        // 4. เปลี่ยนข้อ
        function nextQuestion() {
            if (currentQuestionIndex < currentSessionQuestions.length - 1) {
                currentQuestionIndex++;
                renderCurrentQuestion();
            }
        }
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderCurrentQuestion();
            }
        }

        // 5. ส่งคำตอบ
        function submitQuiz() {
            let score = 0;
            let skipped = 0;
            let wrong = 0;
            wrongQuestionsForRetry = [];

            // ตรวจสอบว่าตอบครบไหม (เตือนสำหรับโหมดที่ไม่ได้เฉลยทันที)
            if (currentMode !== 'instant') {
                const answeredCount = Object.keys(userAnswers).length;
                if (answeredCount < currentSessionQuestions.length) {
                    if(!confirm(`พี่ยังเหลือข้อที่ไม่ได้ตอบอีก ${currentSessionQuestions.length - answeredCount} ข้อนะคะ ยืนยันที่จะส่งเลยไหมคะ?`)) {
                        return;
                    }
                }
            }

            currentSessionQuestions.forEach((q, index) => {
                if(userAnswers[index] === undefined) {
                    skipped++;
                    wrongQuestionsForRetry.push(q);
                } else if(userAnswers[index] === q.correctIndex) {
                    score++;
                } else {
                    wrong++;
                    wrongQuestionsForRetry.push(q);
                }
            });

            // เปลี่ยนหน้าจอ
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('header-subtitle').innerText = "สรุปผลคะแนน เก่งมากค่ะที่ตั้งใจทำจนจบ!";
            
            // แสดงผลสถิติ
            let percent = Math.round((score / currentSessionQuestions.length) * 100);
            
            // Animation ขยับตัวเลขคะแนน
            animateValue("score-display", 0, percent, 1000);
            document.getElementById('score-fraction').innerText = `ทำได้ ${score} จาก ${currentSessionQuestions.length} ข้อ`;
            
            document.getElementById('stat-correct').innerText = score;
            document.getElementById('stat-wrong').innerText = wrong;
            document.getElementById('stat-skipped').innerText = skipped;

            const feedbackMsg = document.getElementById('feedback-msg');
            if (percent === 100) feedbackMsg.innerText = "🎉 เพอร์เฟกต์! พี่คือวิศวกรตัวท็อป!";
            else if (percent >= 80) feedbackMsg.innerText = "👍 เก่งมากๆ ค่ะพี่ ความรู้แน่นสุดๆ";
            else if (percent >= 50) feedbackMsg.innerText = "💪 ครึ่งทางแล้วค่ะ ทบทวนอีกนิดก็เป๊ะแล้ว!";
            else feedbackMsg.innerText = "📚 ไม่เป็นไรนะคะน้องเป็นกำลังใจให้ ลองทบทวนแล้วทำใหม่น้า";

            // จัดการปุ่มซ่อม
            const retryBtn = document.getElementById('retry-wrong-btn');
            if(wrongQuestionsForRetry.length > 0) {
                retryBtn.classList.remove('hidden');
            } else {
                retryBtn.classList.add('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // เอฟเฟกต์ตัวเลขวิ่ง
        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start) + "%";
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // 6. ดูทบทวนเฉลยรวดเดียว
        function showReviewScreen() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('review-screen').classList.remove('hidden');

            const container = document.getElementById('review-container');
            container.innerHTML = '';

            const prefixArr = ['ก.', 'ข.', 'ค.', 'ง.', 'จ.', 'ฉ.'];

            currentSessionQuestions.forEach((q, index) => {
                const selectedVal = userAnswers[index];
                let optionsHtml = '';

                q.displayOptions.forEach((opt, oIndex) => {
                    let boxStyle = "p-3 border rounded-lg text-gray-600 bg-white";
                    const prefix = prefixArr[oIndex] || '';
                    
                    if (oIndex === q.correctIndex) {
                        // ข้อที่ถูก
                        boxStyle = "p-3 border-2 border-green-500 bg-green-50 text-green-800 font-bold shadow-sm";
                    } else if (selectedVal === oIndex && oIndex !== q.correctIndex) {
                        // ข้อที่เลือกผิด
                        boxStyle = "p-3 border-2 border-red-500 bg-red-50 text-red-800 line-through";
                    }

                    optionsHtml += `
                        <div class="${boxStyle} mb-2 flex items-center">
                            <span class="mr-2">${oIndex === q.correctIndex ? '✅' : (selectedVal === oIndex ? '❌' : '⚪')}</span>
                            <span class="font-bold mr-2">${prefix}</span> ${opt}
                        </div>
                    `;
                });

                let statusBadge = '';
                if(selectedVal === undefined) statusBadge = '<span class="bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-xs font-bold">ข้าม</span>';
                else if(selectedVal === q.correctIndex) statusBadge = '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">ตอบถูก</span>';
                else statusBadge = '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">ตอบผิด</span>';

                container.innerHTML += `
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold text-teal-600 uppercase tracking-wider">${q.category}</span>
                            ${statusBadge}
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-4">${index + 1}. ${q.q}</h3>
                        <div>${optionsHtml}</div>
                    </div>
                `;
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToResult() {
            document.getElementById('review-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }

        function retryWrongQuestions() {
            currentSessionQuestions = [...wrongQuestionsForRetry];
            startQuiz(true); 
        }

        function goHome() {
            location.reload(); 
        }
    </script>
</body>
</html>
